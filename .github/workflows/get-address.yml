name: Get SUI Address

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network (testnet or mainnet)'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  get-address:
    runs-on: ubuntu-latest
    steps:
      - name: Install SUI CLI
        run: |
          SUI_VERSION="v1.67.1"
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/testnet-${SUI_VERSION}/sui-testnet-${SUI_VERSION}-ubuntu-x86_64.tgz" -o sui.tgz
          tar -xzf sui.tgz
          sudo mv sui sui-faucet sui-node sui-tool sui-bridge /usr/local/bin/ 2>/dev/null || sudo mv sui /usr/local/bin/
          sui --version

      - name: Derive address from mnemonic
        env:
          MNEMONICS: ${{ inputs.network == 'testnet' && secrets.TESTNET_SUI_MNEMONICS || secrets.MAINNET_SUI_MNEMONICS }}
        run: |
          # Initialize SUI client config (required before keytool import)
          mkdir -p ~/.sui/sui_config
          cat > ~/.sui/sui_config/client.yaml << 'YAML'
          ---
          keystore:
            File: /home/runner/.sui/sui_config/sui.keystore
          envs:
            - alias: testnet
              rpc: "https://fullnode.testnet.sui.io:443"
            - alias: mainnet
              rpc: "https://fullnode.mainnet.sui.io:443"
          active_env: testnet
          YAML
          echo "[]" > ~/.sui/sui_config/sui.keystore

          # Import mnemonic
          OUTPUT=$(sui keytool import "$MNEMONICS" ed25519 2>&1 || true)

          # Extract 0x address (64 hex chars)
          ADDRESS=$(echo "$OUTPUT" | grep -oP '0x[a-f0-9]{64}' | head -1)

          if [ -z "$ADDRESS" ]; then
            # Debug: show output without mnemonics
            echo "keytool output:"
            echo "$OUTPUT" | sed "s/$MNEMONICS/[REDACTED]/g"
            echo "::error::Failed to derive address"
            exit 1
          fi

          NETWORK="${{ inputs.network }}"
          echo "=========================================="
          echo "SUI ${NETWORK^} Address: ${ADDRESS}"
          echo "Explorer: https://suiscan.xyz/${NETWORK}/account/${ADDRESS}"
          echo "=========================================="

          echo "## SUI ${NETWORK^} Address" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${ADDRESS}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Explorer: https://suiscan.xyz/${NETWORK}/account/${ADDRESS}" >> $GITHUB_STEP_SUMMARY
